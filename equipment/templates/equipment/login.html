<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 社区共享器材预约系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .login-card {
            max-width: 400px;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-card">
            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-body p-5">
                    <h2 class="text-center mb-4">
                        🏠 社区器材共享
                    </h2>
                    <p class="text-center text-muted mb-4">欢迎使用社区共享器材预约系统</p>

                    {% if messages %}
                        {% for message in messages %}
                            <div class="alert alert-danger">{{ message }}</div>
                        {% endfor %}
                    {% endif %}

                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label">用户名</label>
                            <input type="text" name="username" class="form-control" required autofocus>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">密码</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2">登录</button>
                    </form>

                    <div class="mt-4 p-3 bg-light rounded">
                        <p class="small text-muted mb-1"><strong>测试账号：</strong></p>
                        <p class="small text-muted mb-0">管理员：admin / admin123</p>
                        <p class="small text-muted mb-0">居民：zhangsan / zs123456</p>
                        <p class="small text-muted mb-0">居民：lisi / ls123456</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
